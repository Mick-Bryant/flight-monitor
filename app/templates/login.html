{% extends "base.html" %}
{% block title %}Login — {{ app_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card mt-5">
      <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0"><i class="bi bi-airplane"></i> {{ app_name }}</h4>
      </div>
      <div class="card-body p-4">
        <h5 class="mb-4 text-center">Sign in to your account</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="you@example.com" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Your password" required>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input type="checkbox" name="remember"
                     class="form-check-input" id="remember">
              <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="{{ url_for('auth.forgot_password') }}"
               class="text-muted small">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
        </form>
      </div>
      <div class="card-footer text-center py-3">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}">Create one</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
