{% extends "base.html" %}
{% block title %}Page Not Found — {{ app_name }}{% endblock %}

{% block content %}
<div class="text-center py-5">
  <i class="bi bi-airplane text-muted" style="font-size:4rem"></i>
  <h1 class="display-4 fw-bold mt-3">404</h1>
  <h4 class="text-muted">This page flew away</h4>
  <p class="text-muted mt-2">
    The page you're looking for doesn't exist or has been moved.
  </p>
  <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary mt-3">
    <i class="bi bi-house"></i> Back to Dashboard
  </a>
</div>
{% endblock %}
