{% extends "base.html" %}
{% block title %}Server Error — {{ app_name }}{% endblock %}

{% block content %}
<div class="text-center py-5">
  <i class="bi bi-exclamation-triangle text-danger" style="font-size:4rem"></i>
  <h1 class="display-4 fw-bold mt-3">500</h1>
  <h4 class="text-muted">Something went wrong</h4>
  <p class="text-muted mt-2">
    An unexpected error occurred. Please try again in a moment.<br>
    If the problem persists please contact the administrator.
  </p>
  <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary mt-3">
    <i class="bi bi-house"></i> Back to Dashboard
  </a>
</div>
{% endblock %}
